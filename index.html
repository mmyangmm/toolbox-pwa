<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f4f7fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="工具箱">
<title>工具箱</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
<link rel="apple-touch-icon" href="./assets/icon.svg">
<style>
  :root {
    --bg: #f4f7fb;
    --surface: #ffffff;
    --text: #1c2433;
    --muted: #667085;
    --line: #dbe2ea;
    --shadow: 0 14px 42px rgba(31, 43, 58, 0.12);
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.86), rgba(244,247,251,0.96)),
      url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1800&q=80") center/cover fixed;
  }

  .shell {
    width: min(980px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 32px 0 42px;
  }

  .topbar {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
  }

  h1 {
    margin: 0;
    font-size: clamp(30px, 6vw, 48px);
    line-height: 1;
    letter-spacing: 0;
  }

  .date {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
  }

  .clock {
    font-variant-numeric: tabular-nums;
    font-size: 28px;
    font-weight: 750;
    color: #233247;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }

  .card {
    min-height: 220px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-decoration: none;
    color: inherit;
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(219,226,234,0.9);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--accent), white 45%);
    box-shadow: 0 18px 50px rgba(31, 43, 58, 0.18);
  }

  .icon {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    background: color-mix(in srgb, var(--accent), white 86%);
  }

  .icon svg { width: 30px; height: 30px; }

  .name {
    margin-top: 22px;
    font-size: 23px;
    font-weight: 760;
  }

  .desc {
    margin-top: 9px;
    color: var(--muted);
    line-height: 1.55;
    font-size: 14px;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 24px;
    font-size: 13px;
    font-weight: 650;
    color: var(--accent);
  }

  .tag {
    color: #667085;
    font-weight: 600;
  }

  .arrow {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }

  .arrow svg { width: 15px; height: 15px; }

  .furniture { --accent: #9a7345; }
  .expense { --accent: #2f8f83; }
  .bookmark { --accent: #4f7cff; }

  .footnote {
    margin-top: 18px;
    color: #52606d;
    font-size: 12px;
  }

  @media (max-width: 760px) {
    body { background-attachment: scroll; }
    .shell { width: min(430px, calc(100vw - 24px)); padding-top: 24px; }
    .topbar { align-items: start; }
    .clock { font-size: 20px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .card { min-height: 168px; padding: 18px; }
    .name { margin-top: 18px; font-size: 21px; }
  }
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div>
      <h1>工具箱</h1>
      <div class="date" id="date">載入中</div>
    </div>
    <div class="clock" id="clock">00:00</div>
  </header>

  <section class="grid" aria-label="工具">
    <a class="card furniture" href="https://mmyangmm.github.io/furniture-catalog/">
      <div>
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="4" y="14" width="5" height="12" rx="2.5" fill="#9a7345"/>
            <rect x="23" y="14" width="5" height="12" rx="2.5" fill="#9a7345"/>
            <rect x="7" y="7" width="18" height="11" rx="3" fill="#c49a68"/>
            <rect x="7" y="17" width="18" height="7" rx="2" fill="#d8b17e"/>
          </svg>
        </div>
        <div class="name">傢俱目錄</div>
        <div class="desc">收藏與管理傢俱品項，支援 Firebase 同步、JSON 匯出匯入與離線使用。</div>
      </div>
      <div class="footer">
        <span class="tag">GitHub Pages PWA</span>
        <span class="arrow">開啟
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
        </span>
      </div>
    </a>

    <a class="card expense" href="https://mmyangmm.github.io/i-expense-pwa/">
      <div>
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="5" y="4" width="22" height="24" rx="5" fill="#2f8f83" opacity="0.18"/>
            <rect x="5" y="4" width="22" height="24" rx="5" stroke="#2f8f83" stroke-width="2"/>
            <path d="M11 11h10M11 16h10M11 21h5" stroke="#2f8f83" stroke-width="2" stroke-linecap="round"/>
            <circle cx="22" cy="22" r="5" fill="#f0784f"/>
            <path d="M22 18.8v6.4M18.8 22h6.4" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="name">i 記帳</div>
        <div class="desc">手機 PWA 記帳工具，支援收入支出、統計、備份與 Firebase 雲端同步。</div>
      </div>
      <div class="footer">
        <span class="tag">GitHub Pages PWA</span>
        <span class="arrow">開啟
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
        </span>
      </div>
    </a>

    <a class="card bookmark" href="https://mmyangmm.github.io/bookmark-catalog/">
      <div>
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none">
            <rect x="6" y="4" width="20" height="24" rx="3" fill="#4f7cff" opacity="0.25"/>
            <rect x="6" y="4" width="20" height="24" rx="3" stroke="#4f7cff" stroke-width="2"/>
            <path d="M11 4v12l5-3 5 3V4" fill="#4f7cff"/>
            <line x1="11" y1="21" x2="21" y2="21" stroke="#4f7cff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="name">書籤目錄</div>
        <div class="desc">整理常用連結與分類，支援 Firebase 同步、JSON 匯出匯入與離線使用。</div>
      </div>
      <div class="footer">
        <span class="tag">GitHub Pages PWA</span>
        <span class="arrow">開啟
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
        </span>
      </div>
    </a>
  </section>

  <div class="footnote">手機可直接輸入此頁網址，或加入主畫面使用。</div>
</main>

<script>
  const weekdays = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
  function tick() {
    const now = new Date();
    document.getElementById("clock").textContent =
      String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
    document.getElementById("date").textContent =
      `${now.getFullYear()} 年 ${now.getMonth() + 1} 月 ${now.getDate()} 日 ${weekdays[now.getDay()]}`;
  }
  tick();
  setInterval(tick, 1000);

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
  }
</script>
</body>
</html>
